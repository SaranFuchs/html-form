<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Form</title>

    <style>
        body {
            margin: 0;
            padding: 1.5rem;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1rem;
        }

        form {
            max-width: 70rem;
            margin: auto;
        }

        fieldset {
            border: 0.1rem solid lightgray;
            border-radius: 0.4rem;
            margin-bottom: 1rem;
            padding: 1rem;
        }

        legend {
            padding: 0 0.3rem;
        }

        .row {
            display: grid;
            grid-template-columns: minmax(10rem, 12rem) 1fr;
            gap: 0.5rem 1rem;
            margin-bottom: 0.75rem;
            align-items: start;
        }

        input,
        select,
        textarea {
            font: inherit;
            box-sizing: border-box;
        }

        input[type="text"],
        input[type="number"],
        input[type="email"] {
            width: min(100%, 16rem);
            padding: 0.25rem;
        }

        textarea {
            width: 100%;
            min-height: 8rem;
            padding: 0.4rem;
            resize: vertical;
        }

        select {
            width: fit-content;
            padding: 0.25rem;
        }

        .choices {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            align-items: center;
        }

        .submit-area {
            text-align: right;
        }

        button {
            background-color: blue;
            color: white;
            font: inherit;
            padding: 0.5rem 0.8rem;
            border: 0.1rem solid black;
            border-radius: 0.4rem;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <form
        action="https://teach-backend-fawn.vercel.app/api/product"
        method="POST"
        enctype="multipart/form-data"
    >
        <fieldset>
            <legend>General Info</legend>

            <div class="row">
                <label for="itemName">Item Name</label>
                <input type="text" id="itemName" name="itemName">
            </div>

            <div class="row">
                <label for="itemDescription">Description</label>
                <textarea id="itemDescription" name="itemDescription"></textarea>
            </div>

            <div class="row">
                <label for="category">Category</label>
                <select id="category" name="category">
                    <option value="notSpecified">notSpecified</option>
                    <option value="consumption">consumption</option>
                    <option value="household">household</option>
                    <option value="electronic">electronic</option>
                    <option value="gadget">gadget</option>
                </select>
            </div>
        </fieldset>

        <fieldset>
            <legend>Misc.</legend>

            <div class="row">
                <label for="inventoryAmount">Inventory Amount</label>
                <input type="number" id="inventoryAmount" name="inventoryAmount">
            </div>

            <div class="row">
                <label for="listPrice">List price</label>
                <input type="number" id="listPrice" name="listPrice">
            </div>

            <div class="row">
                <label>Available Stores</label>

                <div class="choices">
                    <input type="checkbox" id="storeBangkok" name="availableStore[]" value="Bangkok">
                    <label for="storeBangkok">Bangkok</label>

                    <input type="checkbox" id="storePattaya" name="availableStore[]" value="Pattaya">
                    <label for="storePattaya">Pattaya</label>

                    <input type="checkbox" id="storePhuket" name="availableStore[]" value="Phuket">
                    <label for="storePhuket">Phuket</label>
                </div>
            </div>

            <div class="row">
                <label>Status</label>

                <div class="choices">
                    <input type="radio" id="statusActive" name="status" value="Active">
                    <label for="statusActive">Active</label>

                    <input type="radio" id="statusInactive" name="status" value="Inactive">
                    <label for="statusInactive">Inactive</label>
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Staff</legend>

            <div class="row">
                <label for="staffEmail">Staff Email</label>
                <input
                    type="email"
                    id="staffEmail"
                    name="staffEmail"
                    value="u6710707@au.edu"
                >
            </div>
        </fieldset>

        <div class="submit-area">
            <button type="submit">Submit Form</button>
        </div>
    </form>
</body>
</html>
